  <style>
    :root {
      --bg:#0f172a; --card:#1e293b; --border:#334155;
      --primary:#FF6B35; --success:#22c55e; --text:#e2e8f0; --muted:#94a3b8;
      --verified:#0ea5e9;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh}
    a{color:inherit;text-decoration:none}

    /* ── NAV ── */
    nav{background:rgba(15,23,42,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:.85rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:50}
    .nav-logo{background:var(--primary);color:#fff;border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1.1rem;flex-shrink:0}
    .nav-brand{font-weight:700;font-size:1.05rem}
    nav .spacer{flex:1}
    .nav-link{color:var(--muted);font-size:.9rem;padding:.3rem .7rem;border-radius:6px;transition:color .2s}
    .nav-link:hover,.nav-link.active{color:var(--text)}
    .nav-link.active{font-weight:600}
    .nav-cta{background:var(--primary);color:#fff;padding:.4rem 1rem;border-radius:8px;font-weight:600;font-size:.9rem}
    .nav-hamburger{display:none;background:none;border:none;cursor:pointer;padding:.3rem;color:var(--text);flex-direction:column;gap:5px}
    .nav-hamburger span{display:block;width:22px;height:2px;background:currentColor;border-radius:2px;transition:all .25s}
    .nav-hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
    .nav-hamburger.open span:nth-child(2){opacity:0}
    .nav-hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
    .nav-mobile-menu{display:none;position:fixed;top:57px;left:0;right:0;background:rgba(15,23,42,.98);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:1rem 1.5rem;flex-direction:column;gap:.5rem;z-index:49}
    .nav-mobile-menu.open{display:flex}
    .nav-mobile-menu a{padding:.65rem .75rem;border-radius:8px;font-size:.95rem;font-weight:600;color:var(--text);border:1px solid transparent}
    .nav-mobile-menu a:hover{border-color:var(--border);background:var(--card)}

    /* ── FILTER BAR ── */
    .filter-bar{background:var(--card);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;position:sticky;top:57px;z-index:40}
    .search-wrap{flex:1;min-width:180px;max-width:300px;position:relative}
    .search-wrap input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.45rem .75rem .45rem 2rem;color:var(--text);font-size:.875rem;font-family:inherit}
    .search-wrap::before{content:'🔍';position:absolute;left:.6rem;top:50%;transform:translateY(-50%);font-size:.8rem;pointer-events:none}
    .filter-select{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.45rem .75rem;color:var(--text);font-size:.875rem;font-family:inherit;cursor:pointer}
    .cat-pills{display:flex;gap:.4rem;flex-wrap:wrap}
    .pill{background:var(--bg);border:1px solid var(--border);color:var(--muted);border-radius:999px;padding:.25rem .75rem;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
    .pill.active{background:var(--primary);border-color:var(--primary);color:#fff}
    .pill:hover:not(.active){border-color:var(--primary);color:var(--primary)}
    .count-badge{color:var(--muted);font-size:.8rem;white-space:nowrap;margin-left:auto}

    /* ── GRID ── */
    .deals-wrap{max-width:1400px;margin:0 auto;padding:1.25rem 1.5rem}
    .page-header{padding:1.25rem 1.5rem .5rem;max-width:1400px;margin:0 auto}
    .page-header h1{font-size:1.4rem;font-weight:800}
    .page-header p{color:var(--muted);font-size:.875rem;margin-top:.2rem}
    .deals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1rem}

    /* ── DEAL CARD ── */
    .deal-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s;display:flex;flex-direction:column}
    .deal-card:hover{border-color:var(--primary);transform:translateY(-2px)}
    .deal-card.verified{border-color:rgba(14,165,233,.35)}
    .deal-card.verified:hover{border-color:var(--verified)}

    /* image */
    .deal-img{height:150px;background:#0a1120;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:.75rem;position:relative}
    .deal-img img{max-width:100%;max-height:100%;object-fit:contain}
    .deal-img-placeholder{font-size:2.8rem;opacity:.4}

    /* single badge — top-left of image */
    .deal-badge{position:absolute;top:.5rem;left:.5rem;border-radius:5px;padding:.15rem .5rem;font-size:.7rem;font-weight:700;line-height:1.4}
    .badge-nieuw{background:var(--success);color:#fff}
    .badge-disc{background:var(--primary);color:#fff}
    .badge-outlet{background:rgba(148,163,184,.18);color:var(--muted);border:1px solid rgba(148,163,184,.3)}
    .badge-verified{background:rgba(14,165,233,.15);color:var(--verified);border:1px solid rgba(14,165,233,.35)}

    /* body */
    .deal-body{padding:.7rem .85rem;flex:1;display:flex;flex-direction:column;gap:.3rem}
    .deal-source{font-size:.67rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
    .deal-title{font-size:.875rem;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .deal-condition{font-size:.72rem;color:var(--muted);display:flex;align-items:center;gap:.3rem}

    /* price section */
    .deal-price{padding:.6rem .85rem .85rem;border-top:1px solid rgba(51,65,85,.5);display:flex;flex-direction:column;gap:.4rem}
    .price-row{display:flex;align-items:baseline;gap:.5rem;flex-wrap:wrap}
    .price-now{font-size:1.25rem;font-weight:900}
    .price-orig{font-size:.8rem;color:var(--muted);text-decoration:line-through}
    .saving-badge{background:rgba(34,197,94,.15);color:var(--success);border:1px solid rgba(34,197,94,.3);border-radius:5px;padding:.1rem .4rem;font-size:.75rem;font-weight:700}
    .no-orig-label{font-size:.72rem;color:var(--muted);font-style:italic}
    .view-btn{background:var(--primary);color:#fff;border:none;padding:.5rem .9rem;border-radius:8px;font-weight:600;cursor:pointer;font-family:inherit;font-size:.875rem;align-self:flex-start;margin-top:.15rem}
    .view-btn:hover{opacity:.85}

    /* verified strip */
    .verified-strip{height:2px;background:linear-gradient(90deg,var(--verified),#38bdf8)}

    /* tweakers market price row */
    .tweakers-row{font-size:.72rem;color:var(--verified);display:flex;align-items:center;gap:.3rem;margin-top:-.1rem}

    /* favorite button */
    .fav-btn{position:absolute;top:.45rem;right:.5rem;background:rgba(15,23,42,.65);backdrop-filter:blur(4px);border:none;border-radius:6px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:background .15s;line-height:1;padding:0;z-index:2}
    .fav-btn:hover{background:rgba(239,68,68,.25)}
    .fav-btn.active{background:rgba(239,68,68,.2)}

    /* ── PAGINATION ── */
    .pagination{display:flex;align-items:center;justify-content:center;gap:.5rem;padding:2rem 1.5rem;flex-wrap:wrap}
    .page-btn{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:.45rem .85rem;font-size:.875rem;font-weight:600;cursor:pointer;font-family:inherit}
    .page-btn:hover:not(:disabled){border-color:var(--primary);color:var(--primary)}
    .page-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}
    .page-btn:disabled{opacity:.35;cursor:default}
    .page-info{color:var(--muted);font-size:.85rem}

    /* ── EMPTY / SKELETON ── */
    .empty-state{text-align:center;padding:5rem 2rem;color:var(--muted);grid-column:1/-1}
    .empty-state h2{font-size:1.5rem;margin-bottom:.5rem;color:var(--text)}
    .loading-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
    .skel{background:linear-gradient(90deg,var(--card) 25%,#273348 50%,var(--card) 75%);background-size:200% 100%;animation:sh 1.5s infinite;border-radius:6px}
    @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}

    @media(max-width:640px){
      .filter-bar{top:52px;padding:.6rem 1rem}
      .deals-wrap,.page-header{padding:.75rem 1rem}
      .deals-grid{grid-template-columns:1fr}
      nav .nav-link,.nav-cta{display:none}
      .nav-hamburger{display:flex}
      .cat-pills{overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px}
    }
  </style>
</head>

<div class="filter-bar">

  </div>

  <select class="filter-select" id="sort-select" onchange="applyFilters()">
    <option value="besparing">💶 Grootste besparing</option>
    <option value="korting">💸 Meeste korting %</option>
    <option value="prijs-laag">↑ Prijs laag→hoog</option>
    <option value="prijs-hoog">↓ Prijs hoog→laag</option>

  </select>

  <select class="filter-select" id="min-korting-select" onchange="applyFilters()">
    <option value="0">Alle kortingen</option>
    <option value="20">≥ 20% korting</option>
    <option value="30">≥ 30% korting</option>
    <option value="40">≥ 40% korting</option>
  </select>

  <select class="filter-select" id="max-prijs-select" onchange="applyFilters()">
    <option value="9999">Alle prijzen</option>
    <option value="50">Tot €50</option>
    <option value="100">Tot €100</option>
    <option value="250">Tot €250</option>
    <option value="500">Tot €500</option>
    <option value="1000">Tot €1.000</option>
  </select>

  <div class="cat-pills" id="cat-pills"></div>

  <span class="count-badge" id="count-badge">— deals</span>
</div>

<div class="deals-wrap">
  <div class="deals-grid" id="deals-grid">
    <!-- skeleton loaders -->
  </div>
  <div class="pagination" id="pagination"></div>
</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────────────────
const DEALS_PER_PAGE = 24;
const CATEGORIES = [
  { slug:'all',         icon:'🔍', name:'Alles'       },
  { slug:'laptops',     icon:'💻', name:'Laptops'     },
  { slug:'smartphones', icon:'📱', name:'Smartphones' },
  { slug:'audio',       icon:'🎧', name:'Audio'       },
  { slug:'gaming',      icon:'🎮', name:'Gaming'      },
  { slug:'tv',          icon:'📺', name:"TV's"        },
  { slug:'tablets',     icon:'📟', name:'Tablets'     },
  { slug:'wearables',   icon:'⌚', name:'Wearables'   },
  { slug:'camera',      icon:'📷', name:"Camera's"    },
  { slug:'huishouden',  icon:'🏠', name:'Huishouden'  },
];

const ICON = {laptops:'💻',smartphones:'📱',audio:'🎧',gaming:'🎮',tv:'📺',tablets:'📟',wearables:'⌚',camera:'📷',huishouden:'🏠'};

// ── STATE ────────────────────────────────────────────────────────────────
let allDeals=[], filteredDeals=[], currentPage=1;
let activeCategory='all', searchQuery='';

// ── FAVORIETEN ────────────────────────────────────────────────────────────
let favorieten = new Set(JSON.parse(localStorage.getItem('dt_favs') || '[]'));
function saveFavs() { try { localStorage.setItem('dt_favs', JSON.stringify([...favorieten])); } catch(_) {} }
function toggleFav(id, e) {
  e.stopPropagation();
  favorieten.has(id) ? favorieten.delete(id) : favorieten.add(id);
  saveFavs();
  document.querySelectorAll(`.fav-btn[data-id="${id}"]`).forEach(btn => {
    btn.classList.toggle('active', favorieten.has(id));
    btn.textContent = favorieten.has(id) ? '❤' : '♡';
  });
  buildCatPills();
}

const params  = new URLSearchParams(location.search);
const urlCat  = params.get('categorie') || 'all';
const urlQ    = params.get('q') || '';
const urlPag  = parseInt(params.get('pagina') || '1', 10);

// ── FETCH ────────────────────────────────────────────────────────────────
async function boot() {
  renderSkeletons();
  const cached = localStorage.getItem('dt_deals_cache');
  let loaded = false;
  for (let attempt = 0; attempt < 3; attempt++) {
    try {
      const ctrl  = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 10000);
      const res   = await fetch('deals.json?t=' + Date.now(), { signal: ctrl.signal });
      clearTimeout(timer);
      const data  = await res.json();
      allDeals    = (data.deals || []).filter(d => d.price > 0);
      try { localStorage.setItem('dt_deals_cache', JSON.stringify(data)); } catch(_) {}
      loaded = true;
      break;
    } catch(e) {
      if (attempt < 2) {
        await new Promise(r => setTimeout(r, 1000 * (attempt + 1)));
      }
    }
  }
  if (!loaded) {
    if (cached) {
      try {
        const data = JSON.parse(cached);
        allDeals   = (data.deals || []).filter(d => d.price > 0);
        document.getElementById('page-sub').textContent = 'Deals uit cache geladen — mogelijk verouderd.';
      } catch(_) {
        document.getElementById('page-sub').textContent = 'Deals laden mislukt. Vernieuw de pagina.';
        return;
      }
    } else {
      document.getElementById('page-sub').textContent = 'Deals laden mislukt. Vernieuw de pagina.';
      return;
    }
  }
  activeCategory = urlCat;
  searchQuery    = urlQ;
  if (urlQ) document.getElementById('search-input').value = urlQ;
  currentPage = isNaN(urlPag) ? 1 : urlPag;
  buildCatPills();
  applyFilters();
  updatePageMeta();
}

function renderSkeletons() {
  document.getElementById('deals-grid').innerHTML = Array.from({length:8}).map(() => `
    <div class="loading-card">
      <div class="skel" style="height:150px;border-radius:0"></div>
      <div style="padding:.7rem .85rem;display:flex;flex-direction:column;gap:.5rem">
        <div class="skel" style="height:11px;width:55%"></div>
        <div class="skel" style="height:14px"></div>
        <div class="skel" style="height:11px;width:70%"></div>
      </div>
    </div>`).join('');
}

// ── CATEGORY PILLS ───────────────────────────────────────────────────────
function buildCatPills() {
  const counts = {};
  allDeals.forEach(d => {
    const c = d.category || 'elektronica';
    if (c !== 'elektronica') counts[c] = (counts[c]||0)+1;
  });
  const total = allDeals.length;

  // Alleen categorieën met deals + elektronica samenvoegen in "Overig"
  const pills = CATEGORIES.filter(c => c.slug === 'all' || (counts[c.slug]||0) > 0);
  const overig = (counts['elektronica'] || 0) + Object.entries(counts)
    .filter(([k]) => !CATEGORIES.find(c => c.slug === k))
    .reduce((s,[,v]) => s+v, 0);

  let html = pills.map(c => {
    const n = c.slug === 'all' ? total : (counts[c.slug]||0);
    return `<button class="pill${activeCategory===c.slug?' active':''}" onclick="setCategory('${c.slug}')">
      ${c.icon} ${c.name} <span style="opacity:.55;font-weight:400">${n}</span>
    </button>`;
  }).join('');
  if (overig > 0) {
    html += `<button class="pill${activeCategory==='elektronica'?' active':''}" onclick="setCategory('elektronica')">
      ⚡ Overig <span style="opacity:.55;font-weight:400">${overig}</span>
    </button>`;
  }
  if (favorieten.size > 0) {
    html += `<button class="pill${activeCategory==='favorieten'?' active':''}" onclick="setCategory('favorieten')" style="${activeCategory!=='favorieten'?'color:#ef4444;border-color:rgba(239,68,68,.3)':''}">
      ❤ Favorieten <span style="opacity:.55;font-weight:400">${favorieten.size}</span>
    </button>`;
  }
  document.getElementById('cat-pills').innerHTML = html;
}

function setCategory(slug) {
  activeCategory = slug; currentPage = 1;
  buildCatPills(); applyFilters(); updatePageMeta(); pushURLState();
}

// ── SEARCH ───────────────────────────────────────────────────────────────
let searchTimer;
function onSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
    currentPage = 1; applyFilters(); pushURLState();
  }, 250);
}

// ── SCORE ────────────────────────────────────────────────────────────────
// Prioriteit: absolute besparing in euro's, daarna kortingspercentage
function dealScore(d) {
  const k    = d.discount_percent || 0;
  const orig = d.original_price   || 0;
  const prijs= d.price            || 0;
  const besparing = orig > 0 ? Math.min(orig - prijs, 1000) : 0;
  const verified  = d.tweakers_price ? 20 : 0;
  return besparing * 0.7 + k * 0.5 + verified;
}

// ── FILTER + SORT ────────────────────────────────────────────────────────
function applyFilters() {
  const maxPrijs    = parseFloat(document.getElementById('max-prijs-select').value) || 9999;
  const minKorting  = parseInt(document.getElementById('min-korting-select').value) || 0;
  const sort        = document.getElementById('sort-select').value;

  let deals = allDeals.filter(d => {
    const cat = d.category || 'elektronica';
    if (activeCategory === 'favorieten') {
      if (!favorieten.has(d.id)) return false;
    } else if (activeCategory !== 'all') {
      // 'elektronica' pill toont ook onbekende categorieën
      if (activeCategory === 'elektronica') {
        if (CATEGORIES.find(c => c.slug !== 'all' && c.slug !== 'elektronica' && c.slug === cat)) return false;
      } else if (cat !== activeCategory) return false;
    }
    if ((d.price||0) > maxPrijs) return false;
    // Minimum korting: alleen filteren als deal een kortingspercentage heeft
    if (minKorting > 0 && (d.discount_percent||0) < minKorting) return false;
    if (searchQuery) {
      const hay = ((d.title||'')+' '+(d.source||'')+' '+(d.category||'')).toLowerCase();
      if (!hay.includes(searchQuery)) return false;
    }
    return true;
  });

  switch(sort) {
    case 'besparing':  deals.sort((a,b) => dealScore(b) - dealScore(a)); break;
    case 'korting':    deals.sort((a,b) => (b.discount_percent||0) - (a.discount_percent||0)); break;
    case 'prijs-laag': deals.sort((a,b) => (a.price||0) - (b.price||0)); break;
    case 'prijs-hoog': deals.sort((a,b) => (b.price||0) - (a.price||0)); break;
    case 'nieuw':      deals.sort((a,b) => new Date(b.found_at||0) - new Date(a.found_at||0)); break;
  }

  filteredDeals = deals;
  const total = Math.ceil(filteredDeals.length / DEALS_PER_PAGE) || 1;
  if (currentPage > total) currentPage = total;

  document.getElementById('count-badge').textContent = filteredDeals.length + ' deals';
  renderPage();
  renderPagination();
  updatePageMeta();
}

// ── RENDER ───────────────────────────────────────────────────────────────
function renderPage() {
  const start = (currentPage-1)*DEALS_PER_PAGE;
  const page  = filteredDeals.slice(start, start+DEALS_PER_PAGE);
  const grid  = document.getElementById('deals-grid');

  if (!page.length) {
    grid.innerHTML = `<div class="empty-state">
      <h2>Geen deals gevonden</h2>
      <p>Pas de filters aan of zoek op een andere term.</p>
    </div>`;
    return;
  }
  grid.innerHTML = page.map(renderCard).join('');
  grid.querySelectorAll('img').forEach(img => img.addEventListener('error', () => img.style.display='none'));
}

function renderCard(d) {
  const disc     = d.discount_percent || 0;
  const hasOrig  = !!(d.original_price && d.original_price > d.price);
  const isVerif  = !!(d.tweakers_price && d.tweakers_price > d.price);
  const isOutlet = !!(d.condition && !hasOrig);
  const icon     = ICON[d.category] || '⚡';
  const safeUrl  = encodeURIComponent(d.url || '#');
  const safeTitle= (d.title||'').replace(/"/g,'&quot;');

  // Één badge: NIEUW > verified > korting% > outlet
  let isNew = false;
  let badgeHtml = '';
  try {
    const diff = (Date.now() - new Date(d.found_at).getTime()) / 3600000;
    if (diff < 24) isNew = true;
  } catch{}

  if (isNew) {
    badgeHtml = `<span class="deal-badge badge-nieuw">✦ NIEUW</span>`;
  } else if (isVerif) {
    badgeHtml = `<span class="deal-badge badge-verified">✓ Geverifieerd</span>`;
  } else if (disc >= 20 && hasOrig) {
    badgeHtml = `<span class="deal-badge badge-disc">−${disc}%</span>`;
  } else if (isOutlet) {
    badgeHtml = `<span class="deal-badge badge-outlet">Outlet</span>`;
  }

  // Prijs-sectie
  const besparing = hasOrig ? (d.original_price - d.price) : 0;
  let prijsHtml = `<div class="price-row">
    <span class="price-now">€${d.price.toFixed(2)}</span>`;
  if (hasOrig) {
    prijsHtml += `<span class="price-orig">€${d.original_price.toFixed(0)}</span>`;
    if (besparing >= 5) {
      prijsHtml += `<span class="saving-badge">−€${besparing.toFixed(0)}</span>`;
    }
  } else {
    prijsHtml += `<span class="no-orig-label">outlet / retourprijs</span>`;
  }
  prijsHtml += `</div>`;
  // Tweakers marktprijs-rij
  if (isVerif) {
    const twSaving = (d.tweakers_price - d.price).toFixed(0);
    prijsHtml += `<div class="tweakers-row">✓ Marktprijs €${d.tweakers_price.toFixed(0)} · bespaar €${twSaving}</div>`;
  }

  // Conditie tonen als het iets toevoegt (niet "Outlet" als de badge al Outlet is)
  const condLabel = d.condition && !(isOutlet && disc === 0) ? `<div class="deal-condition">${d.condition}</div>` : '';

  const isFav = favorieten.has(d.id);
  return `
  <div class="deal-card${isVerif?' verified':''}" onclick="cardClick('${d.id}')">
    <div class="deal-img">
      ${d.image ? `<img src="${d.image}" alt="${safeTitle}" loading="lazy">` : `<div class="deal-img-placeholder">${icon}</div>`}
      ${badgeHtml}
      <button class="fav-btn${isFav?' active':''}" data-id="${d.id}" onclick="toggleFav('${d.id}',event)" aria-label="${isFav?'Verwijder uit favorieten':'Bewaar deal'}">${isFav?'❤':'♡'}</button>
    </div>
    <div class="deal-body">
      <div class="deal-source">${d.source||''}</div>
      <div class="deal-title">${d.title||''}</div>
      ${condLabel}
    </div>
    <div class="deal-price">
      ${prijsHtml}
      <button class="view-btn" onclick="event.stopPropagation();viewDeal('${d.id}','${safeUrl}')">Bekijk deal →</button>
    </div>
    ${isVerif ? '<div class="verified-strip"></div>' : ''}
  </div>`;
}

// ── PAGINATION ───────────────────────────────────────────────────────────
function renderPagination() {
  const total = Math.ceil(filteredDeals.length / DEALS_PER_PAGE) || 1;
  const el = document.getElementById('pagination');
  if (total <= 1) { el.innerHTML=''; return; }

  const show = new Set([1, total, currentPage, currentPage-1, currentPage+1].filter(p => p>=1 && p<=total));
  const sorted = [...show].sort((a,b)=>a-b);
  let html = `<button class="page-btn" ${currentPage===1?'disabled':''} onclick="goPage(${currentPage-1})">‹ Vorige</button>`;
  let prev=0;
  for (const p of sorted) {
    if (p-prev>1) html += `<span class="page-info">…</span>`;
    html += `<button class="page-btn${currentPage===p?' active':''}" onclick="goPage(${p})">${p}</button>`;
    prev=p;
  }
  html += `<button class="page-btn" ${currentPage===total?'disabled':''} onclick="goPage(${currentPage+1})">Volgende ›</button>`;
  html += `<span class="page-info">Pagina ${currentPage} van ${total}</span>`;
  el.innerHTML = html;
}

function goPage(p) {
  currentPage=p; pushURLState(); renderPage(); renderPagination();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── CLICK TRACKING ───────────────────────────────────────────────────────
function trackClick(dealId, deal) {
  if (typeof gtag !== 'undefined' && deal) {
    gtag('event', 'deal_click', {
      deal_id:       dealId,
      deal_source:   deal.source       || '',
      deal_title:    (deal.title       || '').substring(0, 100),
      deal_price:    deal.price        || 0,
      deal_discount: deal.discount_percent || 0,
      deal_category: deal.category     || '',
      deal_verified: !!(deal.tweakers_price),
      currency:      'EUR',
      value:         deal.price        || 0,
    });
  }
}

function cardClick(dealId) {
  window.location.href = `./deal.html?id=${dealId}`;
}

function viewDeal(dealId, encodedUrl) {
  const deal = allDeals.find(d => d.id === dealId);
  trackClick(dealId, deal);
  window.open(decodeURIComponent(encodedUrl), '_blank', 'noopener');
}

// ── URL STATE ────────────────────────────────────────────────────────────
function pushURLState() {
  const p = new URLSearchParams();
  if (activeCategory !== 'all')  p.set('categorie', activeCategory);
  if (searchQuery)               p.set('q', searchQuery);
  if (currentPage > 1)           p.set('pagina', currentPage);
  const qs = p.toString();
  history.replaceState({}, '', qs ? '?'+qs : location.pathname);
}

// ── PAGE META ────────────────────────────────────────────────────────────
const CAT_META = {
  laptops:     {title:'Laptop Deals',       desc:'De beste laptopdeals van retour- en outletwinkels.'},
  smartphones: {title:'Smartphone Deals',   desc:'Retour en outlet smartphones met forse kortingen.'},
  audio:       {title:'Audio Deals',        desc:'Koptelefoons, speakers en soundbars met korting.'},
  gaming:      {title:'Gaming Deals',       desc:'Gaming-deals: controllers, headsets, laptops en meer.'},
  tv:          {title:'TV & Monitor Deals', desc:'Televisies en monitoren met forse kortingen.'},
  tablets:     {title:'Tablet Deals',       desc:'Retour en outlet tablets met korting.'},
  wearables:   {title:'Wearables Deals',    desc:'Smartwatches en fitnesstrackers met korting.'},
  camera:      {title:'Camera Deals',       desc:"Retour en outlet camera's met korting."},
  huishouden:  {title:'Huishouden Deals',   desc:'Huishoudelijke apparaten met korting.'},
};

function updatePageMeta() {
  const n = filteredDeals.length;
  if (activeCategory === 'all') {
    document.getElementById('page-h1').textContent    = '🛍️ Alle deals';
    document.getElementById('page-title').textContent = 'Alle Deals — DealTracker';
    document.getElementById('page-sub').textContent   = `${n} deals · dagelijks bijgewerkt`;
  } else if (activeCategory === 'favorieten') {
    document.getElementById('page-h1').textContent    = '❤ Mijn favorieten';
    document.getElementById('page-title').textContent = 'Favorieten — DealTracker';
    document.getElementById('page-sub').textContent   = n ? `${n} opgeslagen deals` : 'Nog geen favorieten — klik ♡ op een deal om te bewaren.';
  } else {
    const cat = CATEGORIES.find(c => c.slug === activeCategory);
    const m   = CAT_META[activeCategory] || {};
    const name = cat ? `${cat.icon} ${cat.name}` : activeCategory;
    document.getElementById('page-h1').textContent    = `${name} Deals`;
    document.getElementById('page-title').textContent = `${m.title||name+' Deals'} — DealTracker`;
    document.getElementById('page-sub').textContent   = `${n} deals gevonden`;
    if (m.desc) document.getElementById('page-desc').content = m.desc;
  }
}

// ── MOBILE NAV ───────────────────────────────────────────────────────────
function toggleMobileMenu() {
  document.getElementById('nav-hamburger').classList.toggle('open');
  document.getElementById('nav-mobile-menu').classList.toggle('open');
}
document.addEventListener('click', e => {
  const menu = document.getElementById('nav-mobile-menu');
  const btn  = document.getElementById('nav-hamburger');
  if (menu?.classList.contains('open') && !menu.contains(e.target) && !btn.contains(e.target)) {
    menu.classList.remove('open'); btn.classList.remove('open');
  }
});

boot();
</script>
