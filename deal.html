<!DOCTYPE html>
<html lang="nl">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-D11S1578NB"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-D11S1578NB');
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Deal — DealTracker</title>
  <meta name="description" id="page-desc" content="Retour- en outletdeal op DealTracker.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" id="canonical" href="https://dealtracker.nl/deal.html">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <meta property="og:title" id="og-title" content="Deal — DealTracker">
  <meta property="og:description" id="og-desc" content="Bekijk deze deal op DealTracker.">
  <meta property="og:type" content="website">
  <meta property="og:image" id="og-image" content="https://dealtracker.nl/og-image.png">
  <meta property="og:url" id="og-url" content="https://dealtracker.nl/deal.html">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:#0f172a; --card:#1e293b; --border:#334155;
      --primary:#FF6B35; --success:#22c55e; --text:#e2e8f0; --muted:#94a3b8;
      --verified:#0ea5e9;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh}
    a{color:inherit;text-decoration:none}

    /* ── NAV ── */
    nav{background:rgba(15,23,42,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:.85rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:50}
    .nav-logo{background:var(--primary);color:#fff;border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1.1rem;flex-shrink:0}
    .nav-brand{font-weight:700;font-size:1.05rem}
    nav .spacer{flex:1}
    .nav-link{color:var(--muted);font-size:.9rem;padding:.3rem .7rem;border-radius:6px;transition:color .2s}
    .nav-link:hover{color:var(--text)}
    .nav-cta{background:var(--primary);color:#fff;padding:.4rem 1rem;border-radius:8px;font-weight:600;font-size:.9rem}
    .back-btn{display:flex;align-items:center;gap:.4rem;color:var(--muted);font-size:.875rem;cursor:pointer;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.35rem .8rem;transition:border-color .15s}
    .back-btn:hover{border-color:var(--primary);color:var(--text)}

    /* ── DETAIL LAYOUT ── */
    .detail-wrap{max-width:900px;margin:0 auto;padding:1.5rem}
    .breadcrumb{color:var(--muted);font-size:.8rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:.4rem}
    .breadcrumb a{color:var(--muted)}
    .breadcrumb a:hover{color:var(--text)}

    .detail-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
    .detail-card.verified{border-color:rgba(14,165,233,.4)}

    /* image */
    .detail-img{background:#0a1120;display:flex;align-items:center;justify-content:center;padding:2rem;min-height:260px;position:relative}
    .detail-img img{max-width:100%;max-height:280px;object-fit:contain}
    .detail-img-placeholder{font-size:5rem;opacity:.3}
    .detail-badge{position:absolute;top:.75rem;left:.75rem;border-radius:6px;padding:.2rem .65rem;font-size:.8rem;font-weight:700}
    .badge-nieuw{background:var(--success);color:#fff}
    .badge-disc{background:var(--primary);color:#fff}
    .badge-outlet{background:rgba(148,163,184,.18);color:var(--muted);border:1px solid rgba(148,163,184,.3)}
    .badge-verified{background:rgba(14,165,233,.15);color:var(--verified);border:1px solid rgba(14,165,233,.35)}
    .verified-strip{height:3px;background:linear-gradient(90deg,var(--verified),#38bdf8)}

    /* body */
    .detail-body{padding:1.5rem}
    .detail-source{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.4rem}
    .detail-title{font-size:1.3rem;font-weight:800;line-height:1.35;margin-bottom:.75rem}
    .detail-condition{display:inline-flex;align-items:center;gap:.35rem;font-size:.8rem;color:var(--muted);background:rgba(148,163,184,.1);border:1px solid rgba(148,163,184,.2);border-radius:6px;padding:.2rem .6rem;margin-bottom:1rem}

    /* price */
    .price-section{border-top:1px solid var(--border);padding-top:1.25rem;margin-top:.25rem}
    .price-row{display:flex;align-items:baseline;gap:.6rem;flex-wrap:wrap;margin-bottom:.5rem}
    .price-now{font-size:2rem;font-weight:900}
    .price-orig{font-size:1rem;color:var(--muted);text-decoration:line-through}
    .saving-badge{background:rgba(34,197,94,.15);color:var(--success);border:1px solid rgba(34,197,94,.3);border-radius:6px;padding:.2rem .6rem;font-size:.85rem;font-weight:700}
    .no-orig-label{font-size:.8rem;color:var(--muted);font-style:italic}
    .tweakers-row{font-size:.85rem;color:var(--verified);display:flex;align-items:center;gap:.4rem;margin-bottom:.75rem}

    /* CTA button */
    .cta-btn{display:inline-flex;align-items:center;gap:.5rem;background:var(--primary);color:#fff;padding:.75rem 1.75rem;border-radius:10px;font-weight:700;font-size:1rem;cursor:pointer;border:none;font-family:inherit;transition:opacity .15s;margin-top:.75rem}
    .cta-btn:hover{opacity:.87}
    .cta-btn svg{width:18px;height:18px;flex-shrink:0}

    /* share */
    .share-section{margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--border)}
    .share-label{font-size:.8rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.6rem}
    .share-row{display:flex;gap:.6rem;flex-wrap:wrap}
    .share-btn{display:flex;align-items:center;gap:.4rem;border:1px solid var(--border);border-radius:8px;padding:.4rem .9rem;font-size:.85rem;font-weight:600;cursor:pointer;background:transparent;color:var(--text);font-family:inherit;transition:border-color .15s,background .15s}
    .share-btn:hover{border-color:var(--primary);background:rgba(255,107,53,.08)}
    .share-btn.copied{border-color:var(--success);color:var(--success)}

    /* sparkline chart */
    .chart-section{margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--border)}
    .chart-label{font-size:.8rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.75rem}
    .sparkline-wrap{background:rgba(15,23,42,.6);border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem}
    .sparkline-wrap svg{display:block;width:100%;overflow:visible}
    .price-axis{display:flex;justify-content:space-between;margin-top:.4rem;font-size:.7rem;color:var(--muted)}

    /* skeleton */
    .skel{background:linear-gradient(90deg,var(--card) 25%,#273348 50%,var(--card) 75%);background-size:200% 100%;animation:sh 1.5s infinite;border-radius:8px}
    @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .skeleton-img{height:260px;border-radius:0}
    .skeleton-body{padding:1.5rem;display:flex;flex-direction:column;gap:.75rem}

    .error-state{text-align:center;padding:5rem 2rem;color:var(--muted)}
    .error-state h2{font-size:1.4rem;color:var(--text);margin-bottom:.5rem}

    @media(max-width:640px){
      .detail-wrap{padding:.75rem}
      .detail-title{font-size:1.1rem}
      .price-now{font-size:1.6rem}
      nav .nav-link,.nav-cta{display:none}
    }
  </style>
</head>
<body>

<nav>
  <a href="./" style="display:flex;align-items:center;gap:.6rem">
    <div class="nav-logo">D</div>
    <span class="nav-brand">DealTracker</span>
  </a>
  <div class="spacer"></div>
  <a class="nav-link" href="./deals.html">Alle deals</a>
  <a class="nav-link" href="./laptops.html">Laptops</a>
  <a class="nav-link" href="./smartphones.html">Smartphones</a>
  <a class="nav-cta" href="./">Home</a>
</nav>

<div class="detail-wrap">
  <div class="breadcrumb">
    <a href="./">DealTracker</a> ›
    <a href="./deals.html">Alle deals</a> ›
    <span id="breadcrumb-title">Deal</span>
  </div>
  <div id="detail-content">
    <!-- skeleton -->
    <div class="detail-card">
      <div class="skel skeleton-img"></div>
      <div class="skeleton-body">
        <div class="skel" style="height:12px;width:30%"></div>
        <div class="skel" style="height:22px"></div>
        <div class="skel" style="height:18px;width:60%"></div>
        <div class="skel" style="height:44px;width:40%;margin-top:.5rem"></div>
      </div>
    </div>
  </div>
</div>

<script>
const ICON = {laptops:'💻',smartphones:'📱',audio:'🎧',gaming:'🎮',tv:'📺',tablets:'📟',wearables:'⌚',camera:'📷',huishouden:'🏠'};

// ── SPARKLINE ─────────────────────────────────────────────────────────────
function renderSparkline(history) {
  if (!history || history.length < 2) return '';
  const prices = history.map(h => h.price);
  const minP   = Math.min(...prices);
  const maxP   = Math.max(...prices);
  const range  = maxP - minP || 1;
  const W = 600, H = 70, PAD = 6;

  const toX = i  => (i / (prices.length - 1)) * W;
  const toY = p  => H - PAD - ((p - minP) / range) * (H - PAD * 2);

  const pts   = prices.map((p, i) => `${toX(i).toFixed(1)},${toY(p).toFixed(1)}`).join(' ');
  const areaD = `M${toX(0)},${H} ` + prices.map((p,i) => `L${toX(i).toFixed(1)},${toY(p).toFixed(1)}`).join(' ') + ` L${W},${H} Z`;

  // Date labels for axis
  const first = history[0]?.scraped_at ? new Date(history[0].scraped_at).toLocaleDateString('nl-NL',{day:'numeric',month:'short'}) : '';
  const last  = history[history.length-1]?.scraped_at ? new Date(history[history.length-1].scraped_at).toLocaleDateString('nl-NL',{day:'numeric',month:'short'}) : '';

  return `
    <div class="chart-section">
      <div class="chart-label">📈 Prijsgeschiedenis</div>
      <div class="sparkline-wrap">
        <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="height:70px">
          <defs>
            <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#FF6B35" stop-opacity=".25"/>
              <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <path d="${areaD}" fill="url(#sg)"/>
          <polyline points="${pts}" fill="none" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          ${prices.map((p,i) => `<circle cx="${toX(i).toFixed(1)}" cy="${toY(p).toFixed(1)}" r="4" fill="#FF6B35" stroke="#1e293b" stroke-width="2"/>`).join('')}
        </svg>
        <div class="price-axis">
          <span>${first}</span>
          <span style="color:var(--success)">Min €${minP.toFixed(0)}</span>
          <span style="color:var(--primary)">Max €${maxP.toFixed(0)}</span>
          <span>${last}</span>
        </div>
      </div>
    </div>`;
}

// ── SHARE ─────────────────────────────────────────────────────────────────
function shareWhatsApp(title, url) {
  window.open(`https://wa.me/?text=${encodeURIComponent(title + '\n' + url)}`, '_blank', 'noopener');
}
function shareTelegram(title, url) {
  window.open(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(title)}`, '_blank', 'noopener');
}
function copyLink(url) {
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('copy-btn');
    if (btn) { btn.textContent = '✓ Gekopieerd'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = '🔗 Kopieer link'; btn.classList.remove('copied'); }, 2000); }
  });
}

// ── RENDER ────────────────────────────────────────────────────────────────
function renderDeal(d) {
  const disc     = d.discount_percent || 0;
  const hasOrig  = !!(d.original_price && d.original_price > d.price);
  const isVerif  = !!(d.tweakers_price && d.tweakers_price > d.price);
  const icon     = ICON[d.category] || '⚡';
  const pageUrl  = location.href;

  // Badge
  let badgeHtml = '';
  let isNew = false;
  try { if ((Date.now() - new Date(d.found_at).getTime()) / 3600000 < 24) isNew = true; } catch{}
  if (isNew)         badgeHtml = `<span class="detail-badge badge-nieuw">✦ NIEUW</span>`;
  else if (isVerif)  badgeHtml = `<span class="detail-badge badge-verified">✓ Geverifieerd</span>`;
  else if (disc>=20 && hasOrig) badgeHtml = `<span class="detail-badge badge-disc">−${disc}%</span>`;
  else if (d.condition) badgeHtml = `<span class="detail-badge badge-outlet">${d.condition}</span>`;

  // Prijs
  const besparing = hasOrig ? (d.original_price - d.price) : 0;
  let prijsHtml = `<div class="price-row">
    <span class="price-now">€${d.price.toFixed(2)}</span>`;
  if (hasOrig) {
    prijsHtml += `<span class="price-orig">€${d.original_price.toFixed(0)}</span>`;
    if (besparing >= 5) prijsHtml += `<span class="saving-badge">−€${besparing.toFixed(0)} besparing</span>`;
  } else {
    prijsHtml += `<span class="no-orig-label">outlet / retourprijs</span>`;
  }
  prijsHtml += `</div>`;

  if (isVerif) {
    const twSaving = (d.tweakers_price - d.price).toFixed(0);
    prijsHtml += `<div class="tweakers-row">✓ Marktprijs €${d.tweakers_price.toFixed(0)} · u bespaart €${twSaving} t.o.v. nieuw</div>`;
  }

  const condLabel = d.condition ? `<div class="detail-condition">${d.condition}</div>` : '';

  const sparklineHtml = d.price_history ? renderSparkline(d.price_history) : '';

  const html = `
  <div class="detail-card${isVerif?' verified':''}">
    ${isVerif ? '<div class="verified-strip"></div>' : ''}
    <div class="detail-img">
      ${d.image ? `<img src="${d.image}" alt="${(d.title||'').replace(/"/g,'&quot;')}" loading="eager">` : `<div class="detail-img-placeholder">${icon}</div>`}
      ${badgeHtml}
    </div>
    <div class="detail-body">
      <div class="detail-source">${d.source||''}</div>
      <h1 class="detail-title">${d.title||''}</h1>
      ${condLabel}

      <div class="price-section">
        ${prijsHtml}
        <a class="cta-btn" href="${d.url||'#'}" target="_blank" rel="noopener" onclick="trackDealClick()">
          Bekijk bij ${d.source||'verkoper'}
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>

      <div class="share-section">
        <div class="share-label">Deel deze deal</div>
        <div class="share-row">
          <button class="share-btn" onclick="shareWhatsApp(${JSON.stringify(d.title||'')}, ${JSON.stringify(pageUrl)})">📱 WhatsApp</button>
          <button class="share-btn" onclick="shareTelegram(${JSON.stringify(d.title||'')}, ${JSON.stringify(pageUrl)})">✈ Telegram</button>
          <button class="share-btn" id="copy-btn" onclick="copyLink(${JSON.stringify(pageUrl)})">🔗 Kopieer link</button>
        </div>
      </div>

      ${sparklineHtml}
    </div>
  </div>`;

  document.getElementById('detail-content').innerHTML = html;
  document.querySelector('img[loading="eager"]')?.addEventListener('error', e => e.target.style.display='none');
}

function trackDealClick() {
  if (typeof gtag !== 'undefined') {
    const id = new URLSearchParams(location.search).get('id') || '';
    gtag('event', 'deal_click_detail', { deal_id: id });
  }
}

function showError(msg) {
  document.getElementById('detail-content').innerHTML = `
    <div class="error-state"><h2>Oeps</h2><p>${msg}</p><br><a href="./deals.html" style="color:var(--primary)">← Terug naar alle deals</a></div>`;
}

// ── BOOT ──────────────────────────────────────────────────────────────────
async function boot() {
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { showError('Geen deal ID opgegeven.'); return; }

  const cached = localStorage.getItem('dt_deals_cache');
  let deal = null;

  // Probeer eerst live deals.json
  for (let attempt = 0; attempt < 3; attempt++) {
    try {
      const ctrl  = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 10000);
      const res   = await fetch('./deals.json?t=' + Date.now(), { signal: ctrl.signal });
      clearTimeout(timer);
      const data  = await res.json();
      deal = (data.deals || []).find(d => d.id === id);
      try { localStorage.setItem('dt_deals_cache', JSON.stringify(data)); } catch(_) {}
      break;
    } catch(e) {
      if (attempt < 2) await new Promise(r => setTimeout(r, 1000 * (attempt + 1)));
    }
  }

  // Fallback naar cache
  if (!deal && cached) {
    try { deal = (JSON.parse(cached).deals || []).find(d => d.id === id); } catch(_) {}
  }

  if (!deal) { showError('Deal niet gevonden of niet meer beschikbaar.'); return; }

  // Stel paginameta in
  const title = deal.title || 'Deal';
  document.getElementById('page-title').textContent = title + ' — DealTracker';
  document.getElementById('page-desc').content      = `${deal.source||''} · €${deal.price?.toFixed(2)||'?'} · ${deal.condition||'outlet'} deal op DealTracker.`;
  document.getElementById('og-title').content       = title;
  document.getElementById('og-desc').content        = `€${deal.price?.toFixed(2)||'?'} bij ${deal.source||''} · DealTracker`;
  if (deal.image) document.getElementById('og-image').content = deal.image;
  document.getElementById('og-url').content         = location.href;
  document.getElementById('canonical').href         = location.href;
  document.getElementById('breadcrumb-title').textContent = title.length > 50 ? title.slice(0,50)+'…' : title;

  renderDeal(deal);
}

boot();
</script>
</body>
</html>
